<script>
// ======================== DATA ========================
const modules = [
  {id:'hr',label:'HR Management',color:'#c084fc',group:'people',
   desc:'Manages employee lifecycle — recruitment, onboarding, performance reviews, training, offboarding. Central source of truth for all employee data across the organization.'},
  {id:'finance',label:'Finance',color:'#60a5fa',group:'financial',

  {id:'crm',label:'CRM',color:'#a78bfa',group:'operations',

  {id:'legal',label:'Legal & Contracts',color:'#fb7185',group:'governance',

  {id:'me',label:'Monitoring & Evaluation',color:'#34d399',group:'operations',

const activities = [
  // ── HR ACTIVITIES ──
  {id:'a_onboard',label:'Employee Onboarding',color:'#c084fc',group:'people',
   desc:'New hire setup — creates HR record, enrolls in payroll, generates employment contract, provisions ESS access, assigns orientation training.'},
  {id:'a_offboard',label:'Employee Offboarding',color:'#c084fc',group:'people',

  {id:'a_recruit',label:'Recruitment & Hiring',color:'#c084fc',group:'people',

  {id:'a_perf',label:'Performance Review',color:'#c084fc',group:'people',
   desc:'Manager evaluates employee against KPIs → self-assessment → 360 feedback → rating → salary adjustment recommendation → training plan.'},
  {id:'a_training',label:'Training Program',color:'#c084fc',group:'people',

  {id:'a_promotion',label:'Promotion & Transfer',color:'#c084fc',group:'people',

  {id:'a_attendance',label:'Attendance Tracking',color:'#c084fc',group:'people',

  {id:'a_grievance',label:'Grievance Filing',color:'#c084fc',group:'people',
   desc:'Employee files grievance via ESS → HR assigns investigator → resolution workflow → outcome recorded → may trigger disciplinary action.'},
  {id:'a_orgchart',label:'Org Structure Update',color:'#c084fc',group:'people',

  {id:'a_tax',label:'Tax Computation',color:'#2dd4bf',group:'financial',

  {id:'a_overtime',label:'Overtime Processing',color:'#2dd4bf',group:'financial',
   desc:'Attendance records → identify overtime hours → apply overtime rates → add to monthly salary computation.'},
  {id:'a_bonus',label:'Bonus & Incentive',color:'#2dd4bf',group:'financial',
   desc:'Performance ratings trigger bonus calculation → manager approval → one-time payment added to payroll run → posted to Finance.'},
  {id:'a_deduction',label:'Deduction Processing',color:'#2dd4bf',group:'financial',
   desc:'Loan repayments, salary advances, union dues, insurance premiums — recurring deductions applied before net pay calculation.'},

  // ── FINANCE ACTIVITIES ──

   desc:'Authorized payment document for vendor payments, expense reimbursements, salary disbursements, and petty cash.'},
  {id:'a_budgetck',label:'Budget Validation',color:'#60a5fa',group:'financial',

  {id:'a_finreport',label:'Financial Reporting',color:'#60a5fa',group:'financial',

  {id:'a_petty',label:'Petty Cash Management',color:'#60a5fa',group:'financial',

  {id:'a_bideval',label:'Bid Evaluation',color:'#fbbf24',group:'operations',
   desc:'Evaluation committee scores vendor proposals against weighted criteria → comparative analysis → recommendation report.'},
  {id:'a_po',label:'Purchase Order',color:'#fbbf24',group:'operations',

  {id:'a_receipt',label:'Goods Receipt',color:'#fbbf24',group:'operations',
   desc:'Verify received goods/services against PO specs and quantities. Quality check, damage inspection, acceptance or rejection.'},
  {id:'a_venpay',label:'Vendor Payment',color:'#60a5fa',group:'financial',
   desc:'Finance processes payment after 3-way match (PO + invoice + receipt). Creates payment voucher, updates accounts payable.'},
  {id:'a_veneval',label:'Vendor Performance Review',color:'#fbbf24',group:'operations',
   desc:'Rate vendors on delivery timeliness, quality, responsiveness, compliance. Affects future vendor selection scoring.'},
  {id:'a_contract_renew',label:'Contract Renewal',color:'#fbbf24',group:'operations',

  {id:'a_spendanalysis',label:'Spend Analysis',color:'#fbbf24',group:'operations',

  {id:'a_milestone',label:'Milestone Review',color:'#818cf8',group:'operations',

  {id:'a_projpurch',label:'Project Purchase',color:'#818cf8',group:'operations',
   desc:'Project needs equipment/services → creates purchase requisition in Procurement → costs charged to project budget line.'},
  {id:'a_timetrack',label:'Time Tracking',color:'#818cf8',group:'operations',
   desc:'Team members log hours against project tasks via ESS timesheets → PM reviews → affects resource utilization reports.'},
  {id:'a_risk',label:'Risk Assessment',color:'#818cf8',group:'operations',

  {id:'a_projclose',label:'Project Closure',color:'#818cf8',group:'operations',

  {id:'a_projreport',label:'Project Status Report',color:'#818cf8',group:'operations',

  {id:'a_expense',label:'Expense Claim',color:'#f472b6',group:'financial',

  {id:'a_timesheet',label:'Timesheet Submission',color:'#f472b6',group:'operations',

  {id:'a_infoUpdate',label:'Personal Info Update',color:'#f472b6',group:'people',

  {id:'a_benefits',label:'Benefits Enrollment',color:'#f472b6',group:'people',

  {id:'a_pipeline',label:'Funding Pipeline',color:'#a78bfa',group:'financial',

  {id:'a_compliance',label:'Compliance Review',color:'#fb7185',group:'governance',
   desc:'Legal reviews contracts, policies, and processes against Ghanaian labor law, procurement regulations, and donor requirements.'},
  {id:'a_nda',label:'NDA Processing',color:'#fb7185',group:'governance',
   desc:'Confidentiality agreement for consultants, partners, vendors → Legal drafts → counterparty signs → stored in vault.'},
  {id:'a_dispute',label:'Dispute Resolution',color:'#fb7185',group:'governance',
   desc:'Contract dispute raised → Legal reviews terms → mediation/negotiation → resolution recorded → financial impact assessed.'},
  {id:'a_policy',label:'Policy Management',color:'#fb7185',group:'governance',
   desc:'Draft organizational policy → stakeholder consultation → Legal review → board approval → published to Knowledge Hub → staff notified.'},
  {id:'a_regfiling',label:'Regulatory Filing',color:'#fb7185',group:'governance',

  {id:'a_baseline',label:'Baseline Study',color:'#34d399',group:'operations',

  {id:'a_evalreport',label:'Evaluation Report',color:'#34d399',group:'operations',
   desc:'Compile findings from impact assessments, mid-term reviews, and indicator tracking into formal evaluation reports.'},
  {id:'a_datacollect',label:'Field Data Collection',color:'#34d399',group:'operations',
   desc:'Survey design → field deployment → data entry → validation → analysis. Feeds into impact assessment and KPI tracking.'},

  {id:'a_publish',label:'Content Publishing',color:'#22d3ee',group:'governance',

  {id:'a_policydist',label:'Policy Distribution',color:'#22d3ee',group:'governance',
   desc:'Approved policy published to Knowledge Hub → all-staff notification via ESS → acknowledgment tracking → compliance monitoring.'},
  {id:'a_lessons',label:'Lessons Learned',color:'#22d3ee',group:'governance',

  {id:'a_docattach',label:'Document Attachment',color:'#94a3b8',group:'governance',

  {id:'a_accessreq',label:'Access Request',color:'#94a3b8',group:'governance',

  {id:'a_retention',label:'Retention & Archival',color:'#94a3b8',group:'governance',

  {id:'a_versioning',label:'Version Control',color:'#94a3b8',group:'governance',

  {id:'a_notification',label:'Notification Dispatch',color:'#e879f9',group:'governance',

  {id:'a_useraccess',label:'Access Provisioning',color:'#e879f9',group:'governance',

allNodes.forEach(n => {
  const gr = defs.append('radialGradient').attr('id',`g-${n.id}`).attr('cx','30%').attr('cy','30%');
  gr.append('stop').attr('offset','0%').attr('stop-color', d3.color(n.color).brighter(0.6));
  gr.append('stop').attr('offset','100%').attr('stop-color', n.color);
});

const g = svg.append('g');
const zoomB = d3.zoom().scaleExtent([0.1,5]).on('zoom', e => g.attr('transform',e.transform));
svg.call(zoomB);

const sim = d3.forceSimulation(allNodes)
  .force('link', d3.forceLink(edgesNorm).id(d=>d.id).distance(d => {
    const sn = allNodes.find(n=>n.id===(typeof d.source==='string'?d.source:d.source.id));
    const tn = allNodes.find(n=>n.id===(typeof d.target==='string'?d.target:d.target.id));
    return (sn?.nodeType==='module'&&tn?.nodeType==='module') ? 280 : 80;
  }).strength(0.15))
  .force('charge', d3.forceManyBody().strength(d => d.nodeType==='module' ? -500 : -80))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide().radius(d => d.nodeType==='module'?45:18))
  .force('x', d3.forceX(W/2).strength(0.015))
  .force('y', d3.forceY(H/2).strength(0.015));

const linkEl = g.append('g').selectAll('line').data(edgesNorm).join('line')
  .attr('stroke','rgba(255,255,255,0.04)').attr('stroke-width',0.6);

const linkLbl = g.append('g').selectAll('text').data(edgesNorm).join('text')
  .attr('text-anchor','middle').attr('dy',-3)
  .attr('font-family','Inter').attr('font-size','7.5px').attr('font-weight',400)
  .attr('fill','rgba(255,255,255,0)').attr('pointer-events','none')
  .text(d => d.label);

const nodeEl = g.append('g').selectAll('g').data(allNodes).join('g')
  .attr('cursor','pointer')
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

nodeEl.append('circle')
  .attr('r', d => d.nodeType==='module'?18:8)
  .attr('fill', d => d.color).attr('opacity', d => d.nodeType==='module'?0.06:0.04)
  .attr('class','glow-ring');

nodeEl.append('circle')
  .attr('r', d => d.r)
  .attr('fill', d => d.color).attr('opacity',1)
  .attr('class','dot');

nodeEl.append('text')
  .attr('x', d => d.nodeType==='module'?14:9)
  .attr('y', 3.5)
  .attr('font-family','Inter')
  .attr('font-size', d => d.nodeType==='module'?'11.5px':'9px')
  .attr('font-weight', d => d.nodeType==='module'?500:400)
  .attr('fill', d => d.nodeType==='module'?'rgba(255,255,255,0.75)':'rgba(255,255,255,0.3)')
  .attr('pointer-events','none').attr('class','label')
  .text(d => d.label);

// ======================== INTERACTION ========================
let selected = null;

function getConnected(id) {
  const linked = edgesNorm.filter(e => {
    const s = e.source.id??e.source, t = e.target.id??e.target;
    return s===id||t===id;
  });
  const ids = new Set();
  linked.forEach(e => {ids.add(e.source.id??e.source);ids.add(e.target.id??e.target)});
  ids.delete(id);
  return {linked, ids};
}

nodeEl.on('click', function(ev,d) { ev.stopPropagation(); select(d); });

nodeEl.on('mouseenter', function(ev,d) {
  if (selected) return;
  const {linked,ids} = getConnected(d.id);
  linkEl.attr('stroke', e => {
    const s=e.source.id,t=e.target.id;
    return (s===d.id||t===d.id)?'rgba(255,255,255,0.12)':'rgba(255,255,255,0.02)';
  }).attr('stroke-width', e => {
    const s=e.source.id,t=e.target.id;
    return (s===d.id||t===d.id)?1:0.4;
  });
  nodeEl.select('.label').attr('fill', n =>
    n.id===d.id?'rgba(255,255,255,0.95)':
    ids.has(n.id)?(n.nodeType==='module'?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.3)'):
    n.nodeType==='module'?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.06)');
  nodeEl.select('.dot').attr('opacity', n => n.id===d.id||ids.has(n.id)?1:0.12);
  nodeEl.select('.glow-ring').attr('opacity', n => n.id===d.id?0.2:ids.has(n.id)?0.06:0.01);
});

nodeEl.on('mouseleave', function() { if(!selected) resetVisuals(); });
svg.on('click', () => deselect());

function select(d) {
  selected = d.id;
  const {linked,ids} = getConnected(d.id);

  nodeEl.select('.dot').transition().duration(200)
    .attr('opacity', n => n.id===d.id||ids.has(n.id)?1:0.05)
    .attr('r', n => n.id===d.id?(n.nodeType==='module'?12:6):n.r);
  nodeEl.select('.glow-ring').transition().duration(200)
    .attr('opacity', n => n.id===d.id?0.25:ids.has(n.id)?0.06:0.008)
    .attr('r', n => n.id===d.id?(n.nodeType==='module'?28:14):(n.nodeType==='module'?18:8));
  nodeEl.select('.label').transition().duration(200)
    .attr('fill', n =>
      n.id===d.id?'rgba(255,255,255,1)':
      ids.has(n.id)?(n.nodeType==='module'?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.45)'):
      'rgba(255,255,255,0.04)')
    .attr('font-weight', n => n.id===d.id?700:(n.nodeType==='module'?500:400));

  linkEl.transition().duration(200)
    .attr('stroke', e => {
      const s=e.source.id,t=e.target.id;
      if(s===d.id||t===d.id){const c=d3.color(d.color);c.opacity=0.35;return c+'';}
      return 'rgba(255,255,255,0.01)';
    })
    .attr('stroke-width', e => {
      const s=e.source.id,t=e.target.id;
      return (s===d.id||t===d.id)?1.5:0.3;
    });

  linkLbl.transition().duration(200)
    .attr('fill', e => {
      const s=e.source.id,t=e.target.id;
      return (s===d.id||t===d.id)?'rgba(255,255,255,0.45)':'rgba(255,255,255,0)';
    });

  // Panel
  document.getElementById('p-dot').style.background = d.color;
  document.getElementById('p-title').textContent = d.label;
  document.getElementById('p-type').textContent = d.nodeType==='module'?'Module':'Activity / Process';
  document.getElementById('p-desc').textContent = d.desc;

  const flowsEl = document.getElementById('p-flows');
  flowsEl.innerHTML = '';
  const outgoing = linked.filter(e => e.source.id===d.id);
  const incoming = linked.filter(e => e.target.id===d.id);

  if(outgoing.length){
    flowsEl.innerHTML += '<div class="panel-section">Sends to → ('+outgoing.length+')</div>';
    outgoing.forEach(e => {
      const tgt = allNodes.find(n=>n.id===e.target.id);
      if(!tgt) return;
      const item = document.createElement('div');
      item.className='flow-item';
      item.onclick=()=>select(tgt);
      item.innerHTML=`<div class="flow-dot" style="background:${tgt.color}"></div>
        <div><div class="flow-name">${tgt.label}</div>
        <div class="flow-action">${e.label}</div></div>`;
      flowsEl.appendChild(item);
    });
  }
  if(incoming.length){
    flowsEl.innerHTML += '<div class="panel-section">Receives from ← ('+incoming.length+')</div>';
    incoming.forEach(e => {
      const src = allNodes.find(n=>n.id===e.source.id);
      if(!src) return;
      const item = document.createElement('div');
      item.className='flow-item';
      item.onclick=()=>select(src);
      item.innerHTML=`<div class="flow-dot" style="background:${src.color}"></div>
        <div><div class="flow-name">${src.label}</div>
        <div class="flow-action">${e.label}</div></div>`;
      flowsEl.appendChild(item);
    });
  }
  document.getElementById('panel').classList.add('visible');
}

window.deselect = function(){
  selected=null;
  resetVisuals();
  document.getElementById('panel').classList.remove('visible');
};

function resetVisuals(){
  nodeEl.select('.dot').transition().duration(200).attr('opacity',1).attr('r',d=>d.r);
  nodeEl.select('.glow-ring').transition().duration(200)
    .attr('opacity',d=>d.nodeType==='module'?0.06:0.04)
    .attr('r',d=>d.nodeType==='module'?18:8);
  nodeEl.select('.label').transition().duration(200)
    .attr('fill',d=>d.nodeType==='module'?'rgba(255,255,255,0.75)':'rgba(255,255,255,0.3)')
    .attr('font-weight',d=>d.nodeType==='module'?500:400);
  linkEl.transition().duration(200).attr('stroke','rgba(255,255,255,0.04)').attr('stroke-width',0.6);
  linkLbl.transition().duration(200).attr('fill','rgba(255,255,255,0)');
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.f;
    deselect();
    if(f==='all'){
      nodeEl.transition().duration(300).attr('opacity',1);
      linkEl.transition().duration(300).attr('stroke','rgba(255,255,255,0.04)');
    } else {
      nodeEl.transition().duration(300).attr('opacity',d=>d.group===f?1:0.06);
      linkEl.transition().duration(300).attr('stroke',e=>{
        const sn=allNodes.find(n=>n.id===e.source.id);
        const tn=allNodes.find(n=>n.id===e.target.id);
        return (sn?.group===f||tn?.group===f)?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.005)';
      });
    }
  });
});

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if(!q) { resetVisuals(); return; }
  deselect();
  const matches = new Set(allNodes.filter(n=>n.label.toLowerCase().includes(q)).map(n=>n.id));
  nodeEl.select('.dot').transition().duration(200).attr('opacity',n=>matches.has(n.id)?1:0.06);
  nodeEl.select('.label').transition().duration(200)
    .attr('fill',n=>matches.has(n.id)?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.05)');
  nodeEl.select('.glow-ring').transition().duration(200)
    .attr('opacity',n=>matches.has(n.id)?0.15:0.01);
});

// Tick
sim.on('tick', () => {
  linkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  linkLbl.attr('x',d=>(d.source.x+d.target.x)/2)
         .attr('y',d=>(d.source.y+d.target.y)/2);
  nodeEl.attr('transform',d=>`translate(${d.x},${d.y})`);
});

// Fit after settle
setTimeout(()=>{
  const b=g.node().getBBox();
  const s=0.7/Math.max(b.width/W, b.height/H);
  const tx=W/2-s*(b.x+b.width/2);
  const ty=H/2-s*(b.y+b.height/2);
  svg.transition().duration(1500).call(zoomB.transform, d3.zoomIdentity.translate(tx,ty).scale(s));
},3000);
</script>
</body>
</html>
